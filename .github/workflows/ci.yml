name: CI — Playwright E2E

on:
  pull_request:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Wait for Vercel preview deployment to become ready
  # ──────────────────────────────────────────────────────────────────────────
  wait-for-vercel:
    name: Wait for Vercel Preview
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.vercel-url.outputs.url }}
    steps:
      - name: Wait for Vercel deployment
        id: vercel-url
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300   # 5 minutes max wait
          check_interval: 10 # poll every 10s
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Run Playwright E2E tests against the live Vercel preview URL
  # ──────────────────────────────────────────────────────────────────────────
  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: wait-for-vercel
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers + OS deps
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: ${{ needs.wait-for-vercel.outputs.preview_url }}
          # Pass any secrets the API routes need at runtime
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
